<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@900&display=swap">
    <link rel="icon" type="image/png" href="/assets/Logos/logo-app-icon.png" />
    <link rel="apple-touch-icon" href="/assets/Logos/logo-app-icon.png" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Brumerie" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/assets/Logos/logo-app-icon.png" />
    <link rel="apple-touch-startup-image" href="/assets/Logos/logo-app-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16A34A" media="(prefers-color-scheme: light)" />

    <title>Brumerie — Le commerce local en toute confiance</title>
    <meta name="description" content="Connecte-toi au marché de ton quartier. Achetez et vendez en toute sécurité à Abidjan." />
    <meta property="og:title" content="Brumerie — Le marché de ton quartier" />
    <meta property="og:description" content="Le commerce local en toute confiance. 🇨🇮" />
    <meta property="og:image" content="/assets/logos/og-image.png" />
    <meta property="og:type" content="website" />

    <style>
      /* --- Splash Screen Clean White --- */
      #splash {
        position: fixed;
        inset: 0;
        background-color: #FFFFFF;
        /* Motifs de commerce subtils transparents */
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2316A34A' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .logo-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .halo {
        position: absolute;
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, rgba(22, 163, 74, 0.08) 0%, rgba(22, 163, 74, 0) 70%);
        border-radius: 50%;
        animation: glow 3s infinite ease-in-out;
      }

      #splash img {
        width: 110px;
        height: 110px;
        object-fit: contain;
        position: relative;
        z-index: 2;
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
        animation: entrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .brand-name {
        margin-top: 35px;
        text-align: center;
        padding: 0 30px;
      }

      .brand-name h1 {
        color: #0F172A;
        font-family: 'Syne', system-ui, sans-serif;
        font-weight: 900;
        font-size: 32px;
        letter-spacing: 4px;
        margin: 0;
        text-transform: uppercase;
      }

      .brand-name p {
        color: #16A34A;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 8px;
        opacity: 0.9;
      }

      @keyframes entrance {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes glow {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 0.8; }
      }

      .loader-bar {
        position: absolute;
        bottom: 80px;
        width: 100px;
        height: 2px;
        background: #F1F5F9;
        border-radius: 10px;
        overflow: hidden;
      }
      .loader-progress {
        width: 100%;
        height: 100%;
        background: #16A34A;
        transform: translateX(-100%);
        animation: loading 2s infinite ease-in-out;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(0); }
        100% { transform: translateX(100%); }
      }

      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>

    <div id="splash">
      <div class="logo-container">
        <div class="halo"></div>
        <img src="/assets/Logos/logo-app-icon.png" alt="Brumerie" />
      </div>
      
      <div class="brand-name">
        <h1>BRUMERIE</h1>
        <p>Le commerce local en toute confiance</p>
      </div>

      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 1. Enregistrement du Service Worker (PWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Brumerie Active'))
            .catch(err => console.error('Erreur PWA', err));
        });
      }

      // 2. Animation de sortie du Splash
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
          }
        }, 1500); 
      });
    </script>
  </body>
</html>
